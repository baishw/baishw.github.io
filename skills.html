<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能列表 - BingoClaw</title>
  <meta name="description" content="BingoClaw 技能列表，发现更多精彩技能">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 15, 35, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .navbar .logo {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 16px;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px 20px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(102, 126, 234, 0.4);
      color: #fff;
    }
    
    .header {
      padding: 120px 20px 40px;
      text-align: center;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.125rem;
    }
    
    .search-container {
      max-width: 600px;
      margin: 0 auto 32px;
      padding: 0 20px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 12px 20px;
      margin-bottom: 16px;
    }
    .search-icon {
      margin-right: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .clear-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.5);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .filter-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .filter-tab {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 8px 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .filter-tab:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .filter-tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }
    
    .skills-container {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }
    
    .skill-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .skill-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
      transform: translateX(8px);
    }
    .skill-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .skill-name {
      font-size: 1.25rem;
      color: #667eea;
      font-weight: 600;
    }
    .skill-version {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
    }
    .skill-desc {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .skill-meta {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.3);
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .load-more-container {
      text-align: center;
      padding: 40px 20px;
    }
    .load-more-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: #fff;
      padding: 14px 40px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    .load-more-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    @media (max-width: 768px) {
      .navbar {
        padding: 16px 20px;
      }
      .nav-btn span:last-child {
        display: none;
      }
      .header h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <nav class="navbar">
    <a href="index.html" class="logo">BingoClaw</a>
    <div class="nav-links">
      <a href="index.html" class="nav-btn">
        <span>🏠</span>
        <span>首页</span>
      </a>
      <a href="#skills" class="nav-btn" style="background: rgba(102, 126, 234, 0.2); border-color: rgba(102, 126, 234, 0.4); color: #fff;">
        <span>📚</span>
        <span>技能</span>
      </a>
      <a href="index.html#help" class="nav-btn">
        <span>❓</span>
        <span>帮助</span>
      </a>
      <a href="index.html#contact" class="nav-btn">
        <span>📧</span>
        <span>联系我们</span>
      </a>
    </div>
  </nav>
  
  <header class="header">
    <h1>技能列表</h1>
    <p>探索更多精彩技能，发现无限可能</p>
  </header>
  
  <div class="search-container" id="skills">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索技能名称、描述或作者..." onkeyup="searchSkills()">
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none;">✕</button>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterSkills('all')">全部</button>
      <button class="filter-tab" onclick="filterSkills('newest')">最新发布</button>
      <button class="filter-tab" onclick="filterSkills('popular')">热门推荐</button>
    </div>
  </div>
  
  <div class="skills-container" id="skillsContainer">
    <div class="empty-state" id="emptyState">
      <div class="icon">🔍</div>
      <p>未找到匹配的技能</p>
    </div>
  </div>
  
  <div class="load-more-container" id="loadMoreBtn">
    <button class="load-more-btn" onclick="loadMore()">加载更多</button>
  </div>
  
  <footer class="footer">
    <p>🌙 BingoClaw - 基于 OpenClaw 的智能技能分享平台</p>
  </footer>

  <script>
    const API_BASE = 'https://skill.cxus.cn/api/skill';
    let allSkills = [];
    let currentFilter = 'all';
    let currentPage = 1;
    let totalSkills = 0;
    const pageSize = 20;
    
    function createStars() {
      const starsContainer = document.getElementById('stars');
      const starCount = 80;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.width = Math.random() * 3 + 1 + 'px';
        star.style.height = star.style.width;
        starsContainer.appendChild(star);
      }
    }
    
    function formatTime(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).replace(/\//g, '-');
    }
    
    function getTypeIcon(type) {
      const icons = {
        'function': '⚡',
        'api': '🔗',
        'database': '💾',
        'workflow': '🔄'
      };
      return icons[type] || '📦';
    }
    
    function renderSkills(skills, append = false) {
      const container = document.getElementById('skillsContainer');
      const emptyState = document.getElementById('emptyState');
      
      if (!append) {
        container.innerHTML = '';
      }
      
      if (skills.length === 0 && !append) {
        emptyState.style.display = 'block';
        return;
      }
      
      if (skills.length === 0 && append) {
        return;
      }
      
      emptyState.style.display = 'none';
      
      skills.forEach(skill => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
          <div class="skill-header">
            <span class="skill-name">${getTypeIcon(skill.type)} ${skill.name}</span>
            <span class="skill-version">${skill.version}</span>
          </div>
          <p class="skill-desc">${skill.description || skill.summary || '暂无描述'}</p>
          <div class="skill-meta">
            <span>👤 ${skill.username}</span>
            <span>📅 ${formatTime(skill.createtime)}</span>
            <span>⬇️ ${skill.installcount || 0} 下载</span>
          </div>
        `;
        card.addEventListener('click', () => {
          window.location.href = `skill.html?id=${skill.id}`;
        });
        container.appendChild(card);
      });
    }
    
    async function searchSkills() {
      const query = document.getElementById('searchInput').value;
      const clearBtn = document.getElementById('clearBtn');
      
      clearBtn.style.display = query ? 'block' : 'none';
      currentPage = 1;
      
      try {
        let response;
        let skills = [];
        
        if (currentFilter === 'newest') {
          response = await fetch(`${API_BASE}/latest?page=${currentPage}&limit=${pageSize}${query ? '&q=' + encodeURIComponent(query) : ''}`);
        } else if (currentFilter === 'popular') {
          response = await fetch(`${API_BASE}/hot?page=${currentPage}&limit=${pageSize}${query ? '&q=' + encodeURIComponent(query) : ''}`);
        } else {
          response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&page=${currentPage}&limit=${pageSize}`);
        }
        
        const result = await response.json();
        
        if (result.code === 1 && result.data) {
          skills = result.data.list || [];
          totalSkills = result.data.total || 0;
        }
        
        renderSkills(skills);
        updatePagination();
      } catch (error) {
        console.error('搜索技能失败:', error);
      }
    }
    
    async function loadMore() {
      currentPage++;
      
      try {
        let response;
        let skills = [];
        
        if (currentFilter === 'newest') {
          response = await fetch(`${API_BASE}/latest?page=${currentPage}&limit=${pageSize}`);
        } else if (currentFilter === 'popular') {
          response = await fetch(`${API_BASE}/hot?page=${currentPage}&limit=${pageSize}`);
        } else {
          response = await fetch(`${API_BASE}/index?page=${currentPage}&limit=${pageSize}`);
        }
        
        const result = await response.json();
        
        if (result.code === 1 && result.data) {
          skills = result.data.list || [];
          totalSkills = result.data.total || 0;
        }
        
        renderSkills(skills, true);
        updatePagination();
      } catch (error) {
        console.error('加载更多失败:', error);
        currentPage--;
      }
    }
    
    function updatePagination() {
      const container = document.getElementById('skillsContainer');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      
      if (loadMoreBtn) {
        if (currentPage * pageSize >= totalSkills) {
          loadMoreBtn.style.display = 'none';
        } else {
          loadMoreBtn.style.display = 'block';
        }
      }
    }
    
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').style.display = 'none';
      searchSkills();
    }
    
    function filterSkills(filter) {
      currentFilter = filter;
      
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      
      searchSkills();
    }
    
    async function init() {
      createStars();
      
      try {
        const response = await fetch(`${API_BASE}/index?page=1&limit=${pageSize}`);
        const result = await response.json();
        
        if (result.code === 1 && result.data) {
          allSkills = result.data.list || [];
          totalSkills = result.data.total || 0;
          renderSkills(allSkills);
          updatePagination();
        }
      } catch (error) {
        console.error('初始化失败:', error);
      }
    }
    
    init();
  </script>
</body>
</html>
