<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能列表 - BingoClaw</title>
  <meta name="description" content="BingoClaw 技能列表，发现更多精彩技能">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 15, 35, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .navbar .logo {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 16px;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px 20px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(102, 126, 234, 0.4);
      color: #fff;
    }
    
    .header {
      padding: 120px 20px 40px;
      text-align: center;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.125rem;
    }
    
    .search-container {
      max-width: 600px;
      margin: 0 auto 32px;
      padding: 0 20px;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 12px 20px;
      margin-bottom: 16px;
    }
    .search-icon {
      margin-right: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .clear-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.5);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .filter-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .filter-tab {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 8px 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .filter-tab:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .filter-tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }
    
    .skills-container {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }
    
    .skill-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .skill-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
      transform: translateX(8px);
    }
    .skill-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .skill-name {
      font-size: 1.25rem;
      color: #667eea;
      font-weight: 600;
    }
    .skill-version {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
    }
    .skill-desc {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .skill-meta {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.3);
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    @media (max-width: 768px) {
      .navbar {
        padding: 16px 20px;
      }
      .nav-btn span:last-child {
        display: none;
      }
      .header h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <nav class="navbar">
    <a href="index.html" class="logo">BingoClaw</a>
    <div class="nav-links">
      <a href="index.html" class="nav-btn">
        <span>🏠</span>
        <span>首页</span>
      </a>
      <a href="#skills" class="nav-btn" style="background: rgba(102, 126, 234, 0.2); border-color: rgba(102, 126, 234, 0.4); color: #fff;">
        <span>📚</span>
        <span>技能</span>
      </a>
      <a href="index.html#help" class="nav-btn">
        <span>❓</span>
        <span>帮助</span>
      </a>
      <a href="index.html#contact" class="nav-btn">
        <span>📧</span>
        <span>联系我们</span>
      </a>
    </div>
  </nav>
  
  <header class="header">
    <h1>技能列表</h1>
    <p>探索更多精彩技能，发现无限可能</p>
  </header>
  
  <div class="search-container" id="skills">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索技能名称、描述或作者..." onkeyup="searchSkills()">
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none;">✕</button>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterSkills('all')">全部</button>
      <button class="filter-tab" onclick="filterSkills('newest')">最新发布</button>
      <button class="filter-tab" onclick="filterSkills('popular')">热门推荐</button>
    </div>
  </div>
  
  <div class="skills-container" id="skillsContainer">
    <div class="empty-state" id="emptyState">
      <div class="icon">🔍</div>
      <p>未找到匹配的技能</p>
    </div>
  </div>
  
  <footer class="footer">
    <p>🌙 BingoClaw - 基于 OpenClaw 的智能技能分享平台</p>
  </footer>

  <script>
    const allSkills = [
      { name: 'bingoclaw-helper', version: 'v1.0', desc: 'BingoClaw新用户助手，介绍平台功能与技能创建打包', author: '小虾米', createdAt: '2026-05-23', downloads: 128 },
      { name: 'webchat', version: 'v1.0', desc: '多用户Web聊天室，支持多人实时与AI对话', author: '微信小文', createdAt: '2026-05-22', downloads: 89 },
      { name: 'taobao-sales-rank', version: 'v1.0', desc: '淘宝关键词销量排行榜，自动抓取商品数据生成Excel', author: '微信小文', createdAt: '2026-05-21', downloads: 256 },
      { name: 'skill-sharer', version: 'v2.0', desc: '将 OpenClaw 技能发布到网站，自动生成分享页', author: '微信小文', createdAt: '2026-05-20', downloads: 64 },
      { name: 'voice-control-openclaw', version: 'v1.1', desc: '语音控制 OpenClaw，支持语音命令执行技能', author: '技术达人', createdAt: '2026-05-19', downloads: 156 },
      { name: 'weather-bot', version: 'v1.0', desc: '智能天气预报机器人，支持多地天气查询', author: '小晴天', createdAt: '2026-05-18', downloads: 312 },
      { name: 'news-reader', version: 'v1.2', desc: '每日新闻推送，自定义关键词订阅', author: '资讯达人', createdAt: '2026-05-17', downloads: 203 },
      { name: 'todo-manager', version: 'v2.0', desc: '智能待办事项管理，支持提醒和分类', author: '效率控', createdAt: '2026-05-16', downloads: 445 }
    ];
    
    let currentFilter = 'all';
    
    function createStars() {
      const starsContainer = document.getElementById('stars');
      const starCount = 80;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.width = Math.random() * 3 + 1 + 'px';
        star.style.height = star.style.width;
        starsContainer.appendChild(star);
      }
    }
    
    function renderSkills(skills) {
      const container = document.getElementById('skillsContainer');
      const emptyState = document.getElementById('emptyState');
      
      container.innerHTML = '';
      
      if (skills.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      
      skills.forEach(skill => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
          <div class="skill-header">
            <span class="skill-name">${skill.name}</span>
            <span class="skill-version">${skill.version}</span>
          </div>
          <p class="skill-desc">${skill.desc}</p>
          <div class="skill-meta">
            <span>👤 ${skill.author}</span>
            <span>📅 ${skill.createdAt}</span>
            <span>⬇️ ${skill.downloads} 下载</span>
          </div>
        `;
        card.addEventListener('click', () => {
          window.location.href = `skills/${skill.name}/`;
        });
        container.appendChild(card);
      });
    }
    
    function searchSkills() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const clearBtn = document.getElementById('clearBtn');
      
      clearBtn.style.display = query ? 'block' : 'none';
      
      let filtered = [...allSkills];
      
      if (currentFilter === 'newest') {
        filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (currentFilter === 'popular') {
        filtered.sort((a, b) => b.downloads - a.downloads);
      }
      
      if (query) {
        filtered = filtered.filter(skill => 
          skill.name.toLowerCase().includes(query) || 
          skill.desc.toLowerCase().includes(query) ||
          skill.author.toLowerCase().includes(query)
        );
      }
      
      renderSkills(filtered);
    }
    
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').style.display = 'none';
      searchSkills();
    }
    
    function filterSkills(filter) {
      currentFilter = filter;
      
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      
      searchSkills();
    }
    
    createStars();
    renderSkills(allSkills);
  </script>
</body>
</html>
