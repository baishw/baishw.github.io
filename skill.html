<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BingoClaw 技能分享</title>
<meta name="description" content="BingoClaw AI 技能分享平台">
<meta property="og:type" content="website">
<meta property="og:image" content="https://baishw.github.io/icon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{max-width:460px;width:100%;margin:24px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:32px 24px;text-align:center}
  .logo{font-size:56px;margin-bottom:8px}
  .name{font-size:28px;font-weight:700;background:linear-gradient(90deg,#64b5f6,#42a5f5);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
  .tags{display:flex;gap:8px;justify-content:center;margin:8px 0 16px;flex-wrap:wrap}
  .tag{font-size:12px;background:rgba(66,165,245,0.15);color:#64b5f6;padding:4px 12px;border-radius:12px}
  .desc{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.8;margin:0 0 20px;text-align:left}
  .meta{font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:20px}
  .copy-btn{display:inline-block;background:linear-gradient(90deg,#42a5f5,#64b5f6);color:#fff;border:none;border-radius:12px;
    padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;transition:0.2s;margin-bottom:8px}
  .copy-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(66,165,245,0.3)}
  .url-display{font-size:12px;color:rgba(255,255,255,0.25);word-break:break-all;margin-bottom:20px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#43a047;color:#fff;
    padding:10px 24px;border-radius:10px;font-size:14px;opacity:0;transition:0.3s}
  .install{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;
    padding:20px;text-align:left;font-size:13px;color:rgba(255,255,255,0.4);line-height:2}
  .install strong{color:rgba(255,255,255,0.6)}
  .footer{font-size:11px;color:rgba(255,255,255,0.12);margin-top:24px}
  .not-found{text-align:center;color:rgba(255,255,255,0.5)}
  .not-found .icon{font-size:64px;margin-bottom:16px}
  .not-found h2{font-size:20px;margin-bottom:8px}
  .not-found p{font-size:14px;margin-bottom:20px}
  .back-btn{display:inline-block;color:#64b5f6;text-decoration:none;font-size:14px}
  .back-btn:hover{text-decoration:underline}
.detail-section{margin-top:20px;padding:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;text-align:left}
.detail-section h3{font-size:14px;color:rgba(255,255,255,0.8);margin-bottom:12px;font-weight:600}
.code-block{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;font-size:12px;color:#a0d8ef;font-family:Consolas,Monaco,monospace;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
.info-item{margin-bottom:8px;font-size:13px}
.info-label{color:rgba(255,255,255,0.5);margin-right:8px}
.info-value{color:rgba(255,255,255,0.8)}
code.info-value{background:rgba(0,0,0,0.3);padding:2px 8px;border-radius:4px;font-family:Consolas,Monaco,monospace}
</style></head><body>
<div class="card" id="skillCard">
  <div class="not-found" id="notFound">
    <div class="icon">🔍</div>
    <h2>技能未找到</h2>
    <p>该技能可能已被删除或不存在</p>
    <a href="index.html" class="back-btn">← 返回首页</a>
  </div>
  
  <div id="skillContent" style="display:none">
    <div class="logo">✨</div>
    <div class="name" id="skillName"></div>
    <div class="tags" id="skillTags"></div>
    <div class="desc" id="skillDesc"></div>
    <div class="meta" id="skillMeta"></div>
    <button class="copy-btn" onclick="copyUrl()">📋 复制分享链接</button>
    <div class="url-display" id="downloadUrl"></div>
    <div class="install">
      <strong>💡 使用说明</strong><br>
      1. 复制上方分享链接<br>
      2. 在 BingoClaw 中粘贴链接即可查看<br>
      3. 或分享给好友一起使用
    </div>
    
    <div id="paramsSection"></div>
    <div id="returnsSection"></div>
    <div id="endpointSection"></div>
    <div id="limitSection"></div>
    
    <div class="footer">🌙 BingoClaw · OpenClaw 技能站</div>
  </div>
</div>
<div class="toast" id="toast">✅ 已复制</div>

<script>
const API_BASE = 'https://skill.cxus.cn/api/skill';

function formatTime(timestamp) {
  if (!timestamp) return '未知';
  const date = new Date(timestamp * 1000);
  return date.toLocaleDateString('zh-CN', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).replace(/\//g, '-');
}

function getTypeIcon(type) {
  const icons = {
    'function': '⚡',
    'api': '🔗',
    'database': '💾',
    'workflow': '🔄'
  };
  return icons[type] || '📦';
}

function getTypeName(type) {
  const names = {
    'function': '函数',
    'api': 'API接口',
    'database': '数据库',
    'workflow': '工作流'
  };
  return names[type] || '其他';
}

function getRiskLevelName(level) {
  const names = {
    'low': '低风险',
    'medium': '中风险',
    'high': '高风险',
    'critical': '严重风险'
  };
  return names[level] || '未知';
}

function getRiskLevelClass(level) {
  const classes = {
    'low': '#43a047',
    'medium': '#fb8c00',
    'high': '#e53935',
    'critical': '#d32f2f'
  };
  return classes[level] || '#9e9e9e';
}

function getAuthTypeName(type) {
  const names = {
    'none': '无需认证',
    'api_key': 'API Key',
    'oauth2': 'OAuth2.0',
    'token': 'Token'
  };
  return names[type] || '未知';
}

function formatJSON(str) {
  try {
    if (typeof str === 'string') {
      return JSON.stringify(JSON.parse(str), null, 2);
    }
    return JSON.stringify(str, null, 2);
  } catch (e) {
    return str || '{}';
  }
}

async function loadSkill() {
  const urlParams = new URLSearchParams(window.location.search);
  const skillId = urlParams.get('id');
  
  if (!skillId) {
    document.getElementById('notFound').style.display = 'block';
    return;
  }
  
  try {
    const response = await fetch(`${API_BASE}/detail?id=${skillId}`);
    const result = await response.json();
    
    if (result.code !== 1 || !result.data) {
      document.getElementById('notFound').style.display = 'block';
      return;
    }
    
    const skill = result.data;
    
    document.getElementById('notFound').style.display = 'none';
    document.getElementById('skillContent').style.display = 'block';
    
    document.getElementById('skillName').textContent = skill.name;
    document.getElementById('skillDesc').textContent = skill.description || skill.summary || '暂无描述';
    document.getElementById('skillMeta').textContent = `👤 ${skill.username} · 📅 ${formatTime(skill.createtime)} · ⬇️ ${skill.installcount || 0} 次安装`;
    
    const tags = [
      { text: getTypeIcon(skill.type) + ' ' + getTypeName(skill.type), class: 'type-tag' },
      { text: 'v' + skill.version, class: 'version-tag' },
      { text: getRiskLevelName(skill.risk_level), class: 'risk-tag', style: 'color: ' + getRiskLevelClass(skill.risk_level) }
    ];
    document.getElementById('skillTags').innerHTML = tags.map(t => 
      `<span class="tag" ${t.style ? 'style="' + t.style + '"' : ''}>${t.text}</span>`
    ).join('');
    
    const shareUrl = window.location.href;
    document.getElementById('downloadUrl').textContent = shareUrl;
    
    document.title = `${skill.name} · BingoClaw 技能分享`;
    
    if (skill.params && skill.params !== '{}') {
      document.getElementById('paramsSection').innerHTML = `
        <div class="detail-section">
          <h3>📥 参数说明</h3>
          <pre class="code-block">${formatJSON(skill.params)}</pre>
        </div>
      `;
    }
    
    if (skill.returns && skill.returns !== '{}') {
      document.getElementById('returnsSection').innerHTML = `
        <div class="detail-section">
          <h3>📤 返回值</h3>
          <pre class="code-block">${formatJSON(skill.returns)}</pre>
        </div>
      `;
    }
    
    if (skill.endpoint) {
      document.getElementById('endpointSection').innerHTML = `
        <div class="detail-section">
          <h3>🔗 API 端点</h3>
          <div class="info-item">
            <span class="info-label">端点地址：</span>
            <code class="info-value">${skill.endpoint}</code>
          </div>
          <div class="info-item">
            <span class="info-label">请求方法：</span>
            <span class="info-value">${skill.method || 'POST'}</span>
          </div>
          <div class="info-item">
            <span class="info-label">认证方式：</span>
            <span class="info-value">${getAuthTypeName(skill.auth_type)}</span>
          </div>
        </div>
      `;
    }
    
    if (skill.rate_limit) {
      document.getElementById('limitSection').innerHTML = `
        <div class="detail-section">
          <h3>⚡ 调用限制</h3>
          <div class="info-item">
            <span class="info-label">频率限制：</span>
            <span class="info-value">${skill.rate_limit} 次/分钟</span>
          </div>
          <div class="info-item">
            <span class="info-label">超时时间：</span>
            <span class="info-value">${skill.timeout || 30} 秒</span>
          </div>
        </div>
      `;
    }
    
  } catch (error) {
    console.error('加载技能失败:', error);
    document.getElementById('notFound').style.display = 'block';
  }
}

function copyUrl() {
  const u = document.getElementById('downloadUrl');
  navigator.clipboard.writeText(u.textContent).then(function() {
    var t = document.getElementById('toast');
    t.style.opacity = '1';
    setTimeout(function() { t.style.opacity = '0'; }, 1500);
  }).catch(function() {
    alert('复制失败，请手动复制');
  });
}

loadSkill();
</script>
</body></html>
