<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能分享 - SkillHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            text-align: center;
        }

        .card-header .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .card-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card-body {
            padding: 32px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section p {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            font-weight: 600;
            color: #333;
        }

        .download-section {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
            border: 1px solid #e2e8f0;
        }

        .download-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .download-icon {
            font-size: 32px;
        }

        .download-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .download-info p {
            font-size: 13px;
            color: #64748b;
        }

        .url-box {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .url-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Monaco', 'Consolas', monospace;
            color: #64748b;
            background: white;
        }

        .url-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .copy-btn, .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .copy-btn {
            background: #667eea;
            color: white;
        }

        .copy-btn:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }

        .copy-btn.copied {
            background: #10b981;
        }

        .download-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .install-commands {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            overflow-x: auto;
        }

        .install-commands code {
            display: block;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 24px;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 12px;
            }

            .card-body {
                padding: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .url-box {
                flex-direction: column;
            }

            .action-buttons {
                flex-direction: column;
            }

            .copy-btn, .download-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="icon" id="skill-icon">⚡</div>
                <h1 id="skill-name">技能分享</h1>
                <p id="skill-subtitle">分享技能给好友</p>
            </div>
            
            <div class="card-body">
                <div class="section" id="description-section">
                    <h2>📖 技能描述</h2>
                    <p id="skill-description">-</p>
                </div>

                <div class="section" id="info-section">
                    <h2>📋 技能信息</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">类型</span>
                            <span class="info-value" id="skill-type">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">版本</span>
                            <span class="info-value" id="skill-version">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">格式</span>
                            <span class="info-value" id="skill-format">.skill</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">提供者</span>
                            <span class="info-value" id="skill-author">-</span>
                        </div>
                    </div>
                </div>

                <div class="download-section">
                    <div class="download-header">
                        <span class="download-icon">💾</span>
                        <div class="download-info">
                            <h3 id="download-title">技能安装包</h3>
                            <p id="download-filename">skill-package.skill</p>
                        </div>
                    </div>

                    <div class="url-box">
                        <input type="text" id="download-url" readonly value="" placeholder="请提供下载链接">
                    </div>

                    <div class="action-buttons">
                        <button class="copy-btn" id="copy-btn" onclick="copyDownloadUrl()">
                            <span>📋</span>
                            <span>复制下载地址</span>
                        </button>
                        <a href="#" id="download-btn" download class="download-btn">
                            <span>⬇️</span>
                            <span>下载技能包</span>
                        </a>
                    </div>
                </div>

                <div class="section" id="install-section">
                    <h2>💻 安装说明</h2>
                    <div class="install-commands" id="install-commands">
                        <code id="install-code">📋 复制技能包下载链接
📤 将下载链接发送给BingoClaw
📝 根据BingoClaw的提示完成后续安装操作</code>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 SkillHub. All rights reserved.</p>
        </div>
    </div>

    <div class="toast" id="toast">链接已复制到剪贴板！</div>

    <script>
        const API_BASE_URL = 'https://skill.cxus.cn';
        
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function getSkillIcon(type) {
            const icons = {
                // 通用工具类
                'function': '🔧',      // 通用函数
                'utility': '🛠️',       // 实用工具
                
                // API集成类
                'api': '🌐',           // 通用API接口
                'webhook': '🔗',       // Webhook回调
                'web_service': '🌍',   // Web服务
                
                // 数据库与数据类
                'database': '🗄️',      // 数据库操作
                'search': '🔍',        // 搜索服务
                'knowledge': '📚',     // 知识库
                'data_analysis': '📊', // 数据分析
                
                // 工作流与自动化类
                'workflow': '⚙️',      // 工作流编排
                'automation': '🤖',    // 自动化任务
                'scheduler': '⏰',     // 定时调度
                
                // AI/机器学习类
                'ai': '🧠',            // AI模型调用
                'llm': '💬',           // 大语言模型
                'embedding': '📈',     // 向量嵌入
                'vision': '👁️',        // 视觉识别
                'speech': '🎤',        // 语音处理
                
                // 系统与基础设施类
                'system': '⚡',         // 系统工具
                'file': '📁',          // 文件操作
                'shell': '💻',         // 命令行执行
                'network': '🌐',       // 网络工具
                
                // 业务领域类
                'crm': '👥',           // 客户关系管理
                'erp': '🏢',           // 企业资源规划
                'finance': '💰',       // 财务相关
                'marketing': '📣',     // 营销工具
                'hr': '👤',            // 人力资源
                'supply_chain': '📦',  // 供应链管理
                
                // 通信类
                'email': '📧',         // 邮件服务
                'sms': '📱',           // 短信服务
                'chat': '💬',          // 即时通讯
                'notification': '🔔'   // 通知服务
            };
            return icons[type] || '⚡';
        }

        function getBaseUrl() {
            return window.location.origin + '/skills/';
        }

        function renderSkill(data) {
            document.getElementById('skill-icon').textContent = getSkillIcon(data.type);
            document.getElementById('skill-name').textContent = data.name || '未知技能';
            document.getElementById('skill-subtitle').textContent = data.description ? `${data.description} - v${data.version || '1.0.0'}` : `v${data.version || '1.0.0'}`;
            document.getElementById('skill-description').textContent = data.description || '暂无描述';
            document.getElementById('skill-type').textContent = data.type || 'function';
            document.getElementById('skill-version').textContent = data.version || '1.0.0';
            document.getElementById('skill-author').textContent = data.author || data.username || '-';

            const baseUrl = getBaseUrl();
            const skillName = data.name || 'skill';
            const skillVersion = data.version || '1.0.0';
            const filename = data.filename || `${skillName}-${skillVersion}.skill`;
            
            const downloadUrl = data.downloadUrl || data.url || `${baseUrl}${skillName}.skill`;
            
            document.getElementById('download-title').textContent = data.packageTitle || '技能安装包';
            document.getElementById('download-filename').textContent = filename;
            document.getElementById('download-url').value = downloadUrl;
            document.getElementById('download-btn').href = downloadUrl;
            document.getElementById('download-btn').download = filename;

            const installCmd = `📋 复制技能包下载链接
📤 将下载链接发送给BingoClaw
📝 根据BingoClaw的提示完成后续安装操作`;
            document.getElementById('install-code').textContent = installCmd;

            if (data.name) {
                document.title = `${data.name} - 技能分享 - SkillHub`;
            }
        }

        async function loadSkillInfo() {
            const skillId = getUrlParam('id');
            const name = getUrlParam('name');
            const url = getUrlParam('url');
            const version = getUrlParam('version');
            const type = getUrlParam('type');
            const desc = getUrlParam('desc');
            const author = getUrlParam('author');

            if (skillId) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/skill/detail?id=${skillId}`);
                    const result = await response.json();
                    
                    if (result.code === 1 && result.data) {
                        const skill = result.data;
                        const baseUrl = getBaseUrl();
                        skill.downloadUrl = `${baseUrl}${skill.name || 'skill'}.skill`;
                        skill.filename = `${skill.name || 'skill'}-${skill.version || '1.0.0'}.skill`;
                        renderSkill(skill);
                        return;
                    }
                } catch (error) {
                    console.error('加载技能信息失败:', error);
                }
            }

            if (name) {
                const decodedName = decodeURIComponent(name);
                const decodedUrl = url ? decodeURIComponent(url) : '';
                const decodedDesc = desc ? decodeURIComponent(desc) : '';
                const decodedAuthor = author ? decodeURIComponent(author) : '';
                const decodedVersion = version || '1.0.0';
                
                const skillData = {
                    name: decodedName,
                    version: decodedVersion,
                    type: type || 'function',
                    description: decodedDesc,
                    author: decodedAuthor,
                    downloadUrl: decodedUrl || `${getBaseUrl()}${decodedName}.skill`,
                    filename: `${decodedName}-${decodedVersion}.skill`
                };
                renderSkill(skillData);
            } else {
                document.getElementById('skill-name').textContent = '技能分享平台';
                document.getElementById('skill-subtitle').textContent = '分享技能给好友';
                document.getElementById('skill-description').textContent = '通过 URL 参数分享技能包，支持复制下载链接功能。';
                document.getElementById('install-code').textContent = `📋 复制技能包下载链接
📤 将下载链接发送给BingoClaw
📝 根据BingoClaw的提示完成后续安装操作`;
            }
        }

        function copyDownloadUrl() {
            const url = document.getElementById('download-url').value;
            if (!url) {
                showToast('请先配置下载链接');
                return;
            }

            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制到剪贴板！');
            }).catch(() => {
                const input = document.getElementById('download-url');
                input.select();
                document.execCommand('copy');
                showToast('链接已复制到剪贴板！');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const btn = document.getElementById('copy-btn');
            
            toast.textContent = message;
            toast.classList.add('show');
            btn.classList.add('copied');
            btn.innerHTML = '<span>✓</span><span>已复制</span>';
            
            setTimeout(() => {
                toast.classList.remove('show');
                btn.classList.remove('copied');
                btn.innerHTML = '<span>📋</span><span>复制下载地址</span>';
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', loadSkillInfo);
    </script>
</body>
</html>
